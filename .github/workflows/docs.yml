name: Build and deploy docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Generate docs site
        run: dotnet fsi docs/build.fsx

      - name: Install playground deps
        working-directory: web
        run: npm ci

      - name: Build playground
        working-directory: web
        # Repo is served at /TypeFighter/ on GH Pages; the playground
        # lives under /playground/ so its assets resolve via this base.
        env:
          PLAYGROUND_BASE: /TypeFighter/playground/
        run: npm run build

      - name: Copy playground into docs output
        run: |
          mkdir -p docs/output/playground
          cp -r web/dist/. docs/output/playground/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
