<!DOCTYPE html>
<html>

<head>
  <title>TypeFighter Tree Visualization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {

      
      
      --panel-min-width: 450px;
      --panel-max-width: 450px;




      /* AST Tree visualization */
      --ast-line-color: white;
      --ast-box-background: white;
      --ast-box-solved-background: hsl(119, 100%, 84%);
      --ast-box-intermediate-background: hsl(59, 100%, 78%);
      --ast-box-border-color: black;
      --ast-box-border-width: 1px;
      --ast-text-color: #222;

      /* Run buttons */
      --run-button-background: #blue;
      --run-button-border-color: transparent;
      --run-button-border-width: 1px;
      --run-button-text-color: inherit;
      --run-button-hover-background: #edf2ff;
      --run-button-hover-border-color: white;
      --run-button-active-background: #222;
      --run-button-active-border-color: #999;
      --run-button-active-text-color: #ffffff;

      /* Constraint buttons */
      --constraint-button-background: #2fff;
      --constraint-button-border-color: white;
      --constraint-button-border-width: 1px;
      --constraint-button-hover-background: #edf2ff;
      --constraint-button-hover-border-color: white;
      --constraint-button-disabled-background: #f0f0f0;
      --constraint-button-disabled-border-color: #d0d0d0;

      /* Panels (env-panel, solver-run-panel) */
      --panel-background: #fff;
      --panel-border-color: transparent;
      --panel-border-width: 2px;
      --panel-text-color: #1a1a1a;
      --panel-title-color: #222;
      --panel-content-background: transparent;
      --panel-content-border-color: #d6d9e2;
      --panel-content-border-width: 1px;
      --panel-content-text-color: #222;
      --panel-left-margin: 100px;
      --panel-top-margin: 50px;

      /* Control labels and text */
      --control-label-color: #1a1a1a;
      --control-sublabel-color: #5c6370;

      /* Textarea */
      --textarea-background: transparent;
      --textarea-text-color: #1a1a1a;
      --textarea-border-color: #b6beca;
      --textarea-border-width: 1px;
      --textarea-focus-border-color: black;

      /* Code display */
      --code-background: transparent;
      --code-text-color: #000000;

      /* Code panel (wrapper) */
      --code-panel-background: transparent;
      --code-panel-border-color: #444;
      --code-panel-border-width: 2px;

      /* Type variables (tvar) */
      --tvar-text-color: #444;
      --tvar-background: #dae3ff;
      --tvar-border-color: transparent;
      --tvar-border-width: 3px;
      --tvar-highlight-border-color: black;
      --tvar-highlight-background: #dce400;

      /* Sidebar */
      --sidebar-background: #fafafa;
      --sidebar-border-color: #d0d7de;
      --sidebar-border-width: 1px;
      --sidebar-heading-color: #1a1a1a;

      /* Scrollbar */
      --scrollbar-thumb-color: #c3c7d3;

      /* Resize handle */
      --resize-handle-color: transparent;
      --resize-handle-hover-color: black;

      /* Misc colors */
      --muted-text-color: #888;
      --success-color: green;
      --error-color: red;

      /* Shadows */
      --ast-node-shadow: 0px 0px 8px rgba(255, 255, 255, 0.2);
      --ast-node-hover-shadow: 0px 0px 8px rgba(255, 255, 255, 0.4);
      --ast-node-selected-shadow: 0 0 0 3px rgba(255, 159, 28, 0.6);
      --panel-shadow: 2px 2px 6px rgba(255, 255, 255, 0.0);
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: darkslategray;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #app {
      display: flex;
      height: 100%;
      width: 100%;
    }

    #container {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      container-type: size;
    }

    #container-inner {
      background: radial-gradient(circle, #343434 0%, #000000 100%);
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
      /* Calculate based on container dimensions */
      width: min(100cqw, calc(100cqh * 16 / 9));
      height: min(100cqh, calc(100cqw * 9 / 16));
    }

    #tree-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #sidebar {
      flex: 0 0 400px;
      box-sizing: border-box;
      padding: 40px 24px;
      border-left: var(--sidebar-border-width) solid var(--sidebar-border-color);
      background: var(--sidebar-background);
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      height: 100%;
      scrollbar-width: none;
    }

    #sidebar::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    #sidebar h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--sidebar-heading-color);
    }

    #run-buttons {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      align-content: start;
    }

    .run-button {
      border: var(--run-button-border-width) solid var(--run-button-border-color);
      background: var(--run-button-background);
      color: var(--run-button-text-color);
      border-radius: 3px;
      padding: 2px 4px;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease,
        color 0.2s ease;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .run-button:hover {
      background: var(--run-button-hover-background);
      border-color: var(--run-button-hover-border-color);
    }

    .run-button.active {
      background: var(--run-button-active-background);
      border-color: var(--run-button-active-border-color);
      color: var(--run-button-active-text-color);
    }

    .tvar {
      cursor: none;
      display: inline-block;
      border: var(--tvar-border-width) solid var(--tvar-border-color);
      border-radius: 3px;
      transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.2s ease;
      transform-origin: center;
    }

    .tvar.hidden {
      visibility: hidden;
      opacity: 0;
    }

    .tvar.highlight,
    .env-panel .tvar.highlight,
    .solver-run-panel .tvar.highlight {
      border: var(--tvar-border-width) dotted var(--tvar-highlight-border-color);
      background-color: var(--tvar-highlight-background);
    }

    .first-constraint-left .tvar,
    .first-constraint-left .tvar.highlight {
      background-color: #37f188 !important;
      border: 2px solid #4a6fa5 !important;
    }

    .solver-run-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
      gap: 6px;
      margin-top: 8px;
    }

    .solver-run-buttons .run-button {
      height: 28px;
      font-size: 11px;
      padding: 2px 4px;
    }

    .run-buttons-empty {
      font-size: 14px;
      color: var(--control-sublabel-color);
    }

    .control-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: var(--sidebar-border-width) solid var(--sidebar-border-color);
    }

    .control-section h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--sidebar-heading-color);
    }

    .control-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .control-item input[type='checkbox'] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .control-item label {
      font-size: 13px;
      color: var(--control-label-color);
      cursor: pointer;
      user-select: none;
    }

    .constraint-visibility-control {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      margin-bottom: 8px;
    }

    .constraint-visibility-control label {
      font-size: 13px;
      color: var(--control-label-color);
      font-weight: 500;
    }

    .constraint-visibility-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .constraint-button {
      border: var(--constraint-button-border-width) solid var(--constraint-button-border-color);
      background: var(--constraint-button-background);
      border-radius: 3px;
      padding: 4px 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease;
      min-width: 32px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .constraint-button:hover:not(:disabled) {
      background: var(--constraint-button-hover-background);
      border-color: var(--constraint-button-hover-border-color);
    }

    .constraint-button:disabled {
      background: var(--constraint-button-disabled-background);
      border-color: var(--constraint-button-disabled-border-color);
      cursor: not-allowed;
      opacity: 0.5;
    }

    #constraint-count-display {
      font-size: 13px;
      font-weight: 600;
      color: var(--control-label-color);
      min-width: 40px;
      text-align: center;
    }

    .constraint-hidden {
      visibility: hidden !important;
    }

    .control-textarea-container {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-textarea-container label {
      font-size: 12px;
      font-weight: 500;
      color: var(--control-sublabel-color);
    }

    .control-textarea {
      width: 100%;
      min-height: 100px;
      padding: 8px;
      border: var(--textarea-border-width) solid var(--textarea-border-color);
      border-radius: 4px;
      font-family: Consolas, Monaco, 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.4;
      resize: vertical;
      background: var(--textarea-background);
      color: var(--textarea-text-color);
    }

    .control-textarea:focus {
      outline: none;
      border-color: var(--textarea-focus-border-color);
    }

    .gif-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #d0d7de;
    }

    .gif-section h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .gif-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gif-control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gif-control-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--control-sublabel-color);
    }

    .gif-control-group input {
      border: var(--textarea-border-width) solid var(--textarea-border-color);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      font-family: inherit;
    }

    .gif-control-group input:focus {
      outline: none;
      border-color: var(--textarea-focus-border-color);
    }

    .gif-create-button {
      border: var(--run-button-border-width) solid var(--run-button-active-background);
      background: var(--run-button-active-background);
      color: white;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .gif-create-button:hover {
      background: var(--run-button-active-border-color);
      border-color: var(--run-button-active-border-color);
    }

    .gif-create-button:disabled {
      background: var(--run-button-border-color);
      border-color: var(--run-button-border-color);
      cursor: not-allowed;
    }

    .screenshot-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: var(--sidebar-border-width) solid var(--sidebar-border-color);
    }

    .screenshot-section h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--sidebar-heading-color);
    }

    .screenshot-button {
      width: 100%;
      border: var(--run-button-border-width) solid var(--run-button-active-background);
      background: var(--run-button-active-background);
      color: white;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .screenshot-button:hover {
      background: #36527a;
      border-color: #36527a;
    }

    .screenshot-button:disabled {
      background: #b6beca;
      border-color: #b6beca;
      cursor: not-allowed;
    }

    .downloads-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #d0d7de;
    }

    .downloads-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .downloads-section h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .download-all-button {
      border: 1px solid #4a6fa5;
      background: #4a6fa5;
      color: white;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
      white-space: nowrap;
    }

    .download-all-button:hover:not(:disabled) {
      background: #36527a;
      border-color: #36527a;
    }

    .download-all-button:disabled {
      background: #b6beca;
      border-color: #b6beca;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .download-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .download-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #f5f5f5;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 13px;
      transition: background-color 0.2s ease;
    }

    .download-link:hover {
      background: #e8e8e8;
      border-color: #4a6fa5;
    }

    .download-link-icon {
      font-size: 16px;
    }

    .download-link-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .download-links-empty {
      font-size: 13px;
      color: #5c6370;
      font-style: italic;
    }

    #tree-container {
      position: relative;
      min-width: 1200px;
      min-height: 800px;
      padding: 50px;
      cursor: grab;
      touch-action: none;
      height: 100%;
    }

    #tree-container.panning {
      cursor: grabbing;
    }

    .node {
      position: absolute;
      z-index: 1000;
      background: var(--ast-box-background);
      border: var(--ast-box-border-width) solid var(--ast-box-border-color);
      border-radius: 4px;
      padding: 10px;
      box-shadow: var(--ast-node-shadow);
      cursor: pointer;
      transition: all 0.2s ease;
      word-wrap: break-word;
      overflow-wrap: break-word;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      color: var(--ast-text-color);
    }

    .node:hover {
      box-shadow: var(--ast-node-hover-shadow);
      transform: scale(1.02);
    }

    .node.selected {
      border-color: #ff9f1c;
      box-shadow: var(--ast-node-selected-shadow);
    }

    .node.solved {
      background: var(--ast-box-solved-background) !important;
    }

    .node.intermediate {
      background: var(--ast-box-intermediate-background) !important;
    }

    .node.node-preview {
      position: relative;
      left: 0;
      top: 0;
      width: 100%;
      margin: 0;
      pointer-events: none;
      cursor: default;
      transform: none;
      transition: none;
    }

    .node-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .node-name {
      font-weight: bold;
      font-size: 14px;
      color: var(--ast-text-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .node-title-group {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
    }

    .node-code {
      font-size: 12px;
      font-weight: normal;
      color: var(--ast-text-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      margin-left: 3px;
    }

    .tvar {
      font-size: 12px;
      font-weight: 600;
      color: var(--tvar-text-color);
      background: var(--tvar-background);
      padding: 1px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .node-type {
      font-size: 12px;
      color: green;
      font-family: Consolas, monospace;
      font-weight: bold;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-content-layer {
      position: relative;
      min-width: 1200px;
      min-height: 800px;
    }

    .left-panels-wrapper {
      position: absolute;
      top: var(--panel-top-margin);
      left: var(--panel-left-margin);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 5;
    }

    .env-panel {
      position: relative;
      top: 0;
      left: 0;
      box-sizing: border-box;
      background: var(--panel-background);
      border: var(--panel-border-width) solid var(--panel-border-color);
      border-radius: 4px;
      padding: 16px 18px;
      box-shadow: var(--panel-shadow);
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: var(--panel-text-color);
      min-width: var(--panel-min-width);
      max-width: var(--panel-max-width);
      transition: opacity 0.2s ease, width 0.2s ease, padding 0.2s ease, max-height 0.2s ease;
    }

    .input-panel>.env-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      min-width: 0 !important;
    }

    .solver-run-panel {
      position: relative;
      top: 0;
      left: 0;
    }

    .env-panel-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .input-panel .env-panel-body {
      flex: 1;
      min-height: 0;
    }

    .solver-run-panel .env-panel-body {
      margin-top: 0;
    }

    .solver-run-panel .env-panel-content {
      max-height: none;
    }

    .env-panel-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .env-panel-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--panel-title-color);
    }

    .env-panel-solver-run {
      font-size: 16px;
      font-weight: 600;
      color: var(--panel-text-color);
      padding: 4px 0;
    }

    .env-panel-expression-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .env-panel-expression-title-group {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .env-panel-additional {
      font-size: 11px;
      font-style: italic;
      color: #666;
      margin: 0;
    }

    .env-panel-box {
      padding: 10px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .env-panel-type-text {
      margin: 0;
    }

    .env-panel-placeholder-text {
      font-style: italic;
      color: #666;
      display: block !important;
    }

    .env-panel-hidden {
      visibility: hidden;
    }

    .env-panel.collapsed {
      display: none;
    }

    .env-panel-content {
      font-family: Consolas, monospace;
      font-size: 11px;
      background: var(--panel-content-background);
      border: var(--panel-content-border-width) solid var(--panel-content-border-color);
      border-radius: 4px;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
      color: var(--panel-content-text-color);
      max-height: none;
      overflow: visible;
      user-select: text;
    }

    /* Grid layout only for environment entries */
    .env-panel-section:last-child .env-panel-content {
      display: grid;
      grid-template-columns: max-content max-content auto 1fr;
      column-gap: 8px;
      row-gap: 4px;
      align-items: baseline;
    }

    /* Keep the expression preview visually identical to AST nodes
         (use the same UI font + sizes) so labels like "MK-ARRAY" match */
    .env-panel .node-name,
    .env-panel .node-code,
    .env-panel .tvar {
      font-family: Arial, sans-serif;
    }

    .env-panel .node-name {
      font-size: 14px;
      font-weight: 700;
      color: #000;
    }

    .env-panel .node-code {
      font-size: 12px;
      font-weight: 400;
      color: #333;
    }

    .env-panel .tvar {
      font-size: 12px;
      font-weight: 600;
      color: var(--tvar-text-color);
      background: var(--tvar-background);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .env-panel-env-row {
      display: contents;
    }

    .env-panel-env-row:last-child {
      margin-bottom: 0;
    }

    .env-panel-env-origin {
      font-style: italic;
      color: var(--muted-text-color);
      font-size: 11px;
    }

    .env-panel-env-ident {
      font-weight: 600;
      color: var(--panel-text-color);
      text-align: right;
    }

    .env-panel-env-colon {
      font-weight: 600;
      color: var(--panel-text-color);
    }

    .env-panel-env-type-container {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .env-panel-env-type {
      font-weight: 700;
      color: var(--success-color);
      font-family: Consolas, monospace;
    }
