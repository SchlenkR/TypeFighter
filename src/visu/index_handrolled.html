<!DOCTYPE html>
<html>
<head>
    <title>TypeFighter Tree Visualization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        #container {
            width: 100%;
            height: 100vh;
            overflow: auto;
            background-color: white;
            border: 1px solid #ccc;
        }

        #tree-container {
            position: relative;
            min-width: 1200px;
            min-height: 800px;
            padding: 50px;
        }

        .node {
            position: absolute;
            background: white;
            border: 2px solid darkblue;
            border-radius: 4px;
            padding: 10px;
            min-width: 150px;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .node:hover {
            box-shadow: 4px 4px 8px rgba(0,0,0,0.2);
            transform: scale(1.02);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .node-name {
            font-weight: bold;
            font-size: 12px;
            color: #000;
        }

        .node-var {
            font-size: 10px;
            color: #666;
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .node-additional {
            font-size: 10px;
            color: gray;
            font-style: italic;
            font-family: Consolas, monospace;
            margin: 4px 0;
            line-height: 1.2;
        }

        .node-type {
            font-size: 14px;
            color: green;
            font-weight: bold;
            font-family: Consolas, monospace;
            margin-top: 4px;
        }

        .node-env {
            font-size: 9px;
            color: #555;
            font-family: Consolas, monospace;
            margin-top: 4px;
            padding: 4px;
            background: #f9f9f9;
            border-radius: 2px;
            max-width: 200px;
            overflow-wrap: break-word;
        }

        .connection-line {
            position: absolute;
            background: #333;
            z-index: 1;
        }

        .connection-arrow {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #333;
            z-index: 2;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            z-index: 1000;
        }

        .control-button {
            margin: 2px;
            padding: 5px 10px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        .control-button:hover {
            background: #005a99;
        }
    </style>
    <script src="./data/data.js"></script>
</head>
<body>
    <div class="controls">
        <button class="control-button" onclick="zoomIn()">Zoom In</button>
        <button class="control-button" onclick="zoomOut()">Zoom Out</button>
        <button class="control-button" onclick="resetZoom()">Reset</button>
        <button class="control-button" onclick="toggleEnv()">Toggle Env</button>
    </div>
    
    <div id="container">
        <div id="tree-container"></div>
    </div>

    <script>
        class TreeVisualizer {
            constructor() {
                this.nodes = new Map();
                this.links = [];
                this.nodePositions = new Map();
                this.levelHeight = 120;
                this.nodeWidth = 220;
                this.showEnv = false;
                this.zoomLevel = 1;
                this.container = document.getElementById('tree-container');
                
                this.init();
            }

            init() {
                // Parse data
                this.parseData();
                // Calculate layout
                this.calculateLayout();
                // Render tree
                this.render();
            }

            parseData() {
                // Create nodes map
                window.nodeDataArray.forEach(nodeData => {
                    this.nodes.set(nodeData.key, {
                        ...nodeData,
                        children: [],
                        parents: []
                    });
                });

                // Create links and establish parent-child relationships
                window.linkDataArray.forEach(link => {
                    const parent = this.nodes.get(link.from);
                    const child = this.nodes.get(link.to);
                    
                    if (parent && child) {
                        parent.children.push(child);
                        child.parents.push(parent);
                        this.links.push({ parent, child });
                    }
                });
            }

            calculateLayout() {
                // Find root nodes (nodes with no parents)
                const roots = Array.from(this.nodes.values()).filter(node => node.parents.length === 0);
                
                // Calculate positions using a top-down approach
                roots.forEach((root, index) => {
                    this.calculateNodePositions(root, 0, index * 400, new Set());
                });
            }

            calculateNodePositions(node, level, baseX, visited) {
                if (visited.has(node.key)) return baseX;
                visited.add(node.key);

                const y = level * this.levelHeight + 50;
                
                if (node.children.length === 0) {
                    // Leaf node
                    this.nodePositions.set(node.key, { x: baseX, y });
                    return baseX + this.nodeWidth;
                } else {
                    // Internal node - position children first, then center parent
                    let currentX = baseX;
                    const childPositions = [];
                    
                    node.children.forEach(child => {
                        currentX = this.calculateNodePositions(child, level + 1, currentX, visited);
                        childPositions.push(this.nodePositions.get(child.key));
                    });
                    
                    // Center parent over children
                    const leftmostChild = Math.min(...childPositions.map(pos => pos.x));
                    const rightmostChild = Math.max(...childPositions.map(pos => pos.x));
                    const centerX = (leftmostChild + rightmostChild) / 2;
                    
                    this.nodePositions.set(node.key, { x: centerX, y });
                    return currentX;
                }
            }

            render() {
                this.container.innerHTML = '';
                
                // Render connections first (so they appear behind nodes)
                this.renderConnections();
                
                // Render nodes
                this.nodes.forEach(node => {
                    this.renderNode(node);
                });
            }

            renderConnections() {
                this.links.forEach(link => {
                    const parentPos = this.nodePositions.get(link.parent.key);
                    const childPos = this.nodePositions.get(link.child.key);
                    
                    if (parentPos && childPos) {
                        // Calculate connection points
                        const startX = parentPos.x + this.nodeWidth / 2;
                        const startY = parentPos.y + 80; // Approximate node height
                        const endX = childPos.x + this.nodeWidth / 2;
                        const endY = childPos.y;
                        
                        // Create vertical line from parent
                        const line1 = document.createElement('div');
                        line1.className = 'connection-line';
                        line1.style.left = startX + 'px';
                        line1.style.top = startY + 'px';
                        line1.style.width = '2px';
                        line1.style.height = '20px';
                        this.container.appendChild(line1);
                        
                        // Create horizontal line
                        const minX = Math.min(startX, endX);
                        const maxX = Math.max(startX, endX);
                        const midY = startY + 20;
                        
                        const line2 = document.createElement('div');
                        line2.className = 'connection-line';
                        line2.style.left = minX + 'px';
                        line2.style.top = midY + 'px';
                        line2.style.width = (maxX - minX) + 'px';
                        line2.style.height = '2px';
                        this.container.appendChild(line2);
                        
                        // Create vertical line to child
                        const line3 = document.createElement('div');
                        line3.className = 'connection-line';
                        line3.style.left = endX + 'px';
                        line3.style.top = midY + 'px';
                        line3.style.width = '2px';
                        line3.style.height = (endY - midY) + 'px';
                        this.container.appendChild(line3);
                        
                        // Create arrow
                        const arrow = document.createElement('div');
                        arrow.className = 'connection-arrow';
                        arrow.style.left = (endX - 6) + 'px';
                        arrow.style.top = (endY - 8) + 'px';
                        this.container.appendChild(arrow);
                    }
                });
            }

            renderNode(node) {
                const position = this.nodePositions.get(node.key);
                if (!position) return;

                const nodeElement = document.createElement('div');
                nodeElement.className = 'node';
                nodeElement.style.left = position.x + 'px';
                nodeElement.style.top = position.y + 'px';
                nodeElement.style.width = this.nodeWidth + 'px';

                // Node header (name + variable number)
                const header = document.createElement('div');
                header.className = 'node-header';
                
                const nameEl = document.createElement('div');
                nameEl.className = 'node-name';
                nameEl.textContent = node.name;
                
                const varEl = document.createElement('div');
                varEl.className = 'node-var';
                varEl.textContent = 'tv_' + node.varNum;
                
                header.appendChild(nameEl);
                header.appendChild(varEl);
                nodeElement.appendChild(header);

                // Additional info (if present)
                if (node.additionalInfo && node.additionalInfo.trim()) {
                    const additionalEl = document.createElement('div');
                    additionalEl.className = 'node-additional';
                    additionalEl.textContent = node.additionalInfo;
                    nodeElement.appendChild(additionalEl);
                }

                // Expression type
                if (node.exprTyp && node.exprTyp.trim()) {
                    const typeEl = document.createElement('div');
                    typeEl.className = 'node-type';
                    typeEl.textContent = node.exprTyp;
                    nodeElement.appendChild(typeEl);
                }

                // Environment (if present and visible)
                if (node.env && node.env.trim() && this.showEnv) {
                    const envEl = document.createElement('div');
                    envEl.className = 'node-env';
                    envEl.textContent = node.env;
                    nodeElement.appendChild(envEl);
                }

                this.container.appendChild(nodeElement);
            }

            toggleEnvironment() {
                this.showEnv = !this.showEnv;
                this.render();
            }

            zoom(factor) {
                this.zoomLevel *= factor;
                this.container.style.transform = `scale(${this.zoomLevel})`;
                this.container.style.transformOrigin = 'top left';
            }

            resetZoom() {
                this.zoomLevel = 1;
                this.container.style.transform = 'scale(1)';
            }
        }

        // Global instance
        let treeViz;

        // Initialize when page loads
        window.addEventListener('load', () => {
            treeViz = new TreeVisualizer();
        });

        // Control functions
        function zoomIn() {
            if (treeViz) treeViz.zoom(1.2);
        }

        function zoomOut() {
            if (treeViz) treeViz.zoom(0.8);
        }

        function resetZoom() {
            if (treeViz) treeViz.resetZoom();
        }

        function toggleEnv() {
            if (treeViz) treeViz.toggleEnvironment();
        }
    </script>
</body>
</html>
