<!DOCTYPE html>
<html>
  <head>
    <title>TypeFighter Tree Visualization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background-color: lightblue;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      #app {
        display: flex;
        height: 100%;
        width: 100%;
      }

      #container {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        min-width: 0;
        height: 100%;
      }

      #sidebar {
        flex: 0 0 400px;
        box-sizing: border-box;
        padding: 40px 24px;
        border-left: 1px solid #d0d7de;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
        height: 100%;
        scrollbar-width: none;
      }

      #sidebar::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      #sidebar h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
      }

      #run-buttons {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
        align-content: start;
      }

      .run-button {
        border: 1px solid #b6beca;
        background: #ffffff;
        border-radius: 3px;
        padding: 2px 4px;
        font-size: 11px;
        text-align: center;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease,
          color 0.2s ease;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .run-button:hover {
        background: #edf2ff;
        border-color: #4a6fa5;
      }

      .run-button.active {
        background: #4a6fa5;
        border-color: #36527a;
        color: #ffffff;
      }

      .tvar {
        cursor: none;
        display: inline-block;
        border: 2px solid transparent;
        border-radius: 3px;
      }

      .tvar.highlight,
      .env-panel .tvar.highlight,
      .solver-run-panel .tvar.highlight {
        border: 2px dotted #4a6fa5;
        background-color: #e0e0e0;
      }

      .first-constraint-left .tvar,
      .first-constraint-left .tvar.highlight {
        background-color: #37f188 !important;
        border: 2px solid #4a6fa5 !important;
      }

      .solver-run-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
        gap: 6px;
        margin-top: 8px;
      }

      .solver-run-buttons .run-button {
        height: 28px;
        font-size: 11px;
        padding: 2px 4px;
      }

      .run-buttons-empty {
        font-size: 14px;
        color: #5c6370;
      }

      .control-section {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #d0d7de;
      }

      .control-section h2 {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
      }

      .control-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .control-item input[type='checkbox'] {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }

      .control-item label {
        font-size: 13px;
        color: #1a1a1a;
        cursor: pointer;
        user-select: none;
      }

      .control-textarea-container {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-textarea-container label {
        font-size: 12px;
        font-weight: 500;
        color: #5c6370;
      }

      .control-textarea {
        width: 100%;
        min-height: 100px;
        padding: 8px;
        border: 1px solid #b6beca;
        border-radius: 4px;
        font-family: Consolas, Monaco, 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.4;
        resize: vertical;
        background: #ffffff;
        color: #1a1a1a;
      }

      .control-textarea:focus {
        outline: none;
        border-color: #4a6fa5;
      }

      .gif-section {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #d0d7de;
      }

      .gif-section h2 {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
      }

      .gif-controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .gif-control-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .gif-control-group label {
        font-size: 12px;
        font-weight: 500;
        color: #5c6370;
      }

      .gif-control-group input {
        border: 1px solid #b6beca;
        border-radius: 4px;
        padding: 6px 8px;
        font-size: 13px;
        font-family: inherit;
      }

      .gif-control-group input:focus {
        outline: none;
        border-color: #4a6fa5;
      }

      .gif-create-button {
        border: 1px solid #4a6fa5;
        background: #4a6fa5;
        color: white;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .gif-create-button:hover {
        background: #36527a;
        border-color: #36527a;
      }

      .gif-create-button:disabled {
        background: #b6beca;
        border-color: #b6beca;
        cursor: not-allowed;
      }

      .screenshot-section {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #d0d7de;
      }

      .screenshot-section h2 {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
      }

      .screenshot-button {
        width: 100%;
        border: 1px solid #4a6fa5;
        background: #4a6fa5;
        color: white;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .screenshot-button:hover {
        background: #36527a;
        border-color: #36527a;
      }

      .screenshot-button:disabled {
        background: #b6beca;
        border-color: #b6beca;
        cursor: not-allowed;
      }

      .downloads-section {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #d0d7de;
      }

      .downloads-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .downloads-section h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
      }

      .download-all-button {
        border: 1px solid #4a6fa5;
        background: #4a6fa5;
        color: white;
        border-radius: 4px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s ease;
        white-space: nowrap;
      }

      .download-all-button:hover:not(:disabled) {
        background: #36527a;
        border-color: #36527a;
      }

      .download-all-button:disabled {
        background: #b6beca;
        border-color: #b6beca;
        cursor: not-allowed;
        opacity: 0.6;
      }

      .download-links {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .download-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #f5f5f5;
        border: 1px solid #d0d7de;
        border-radius: 4px;
        text-decoration: none;
        color: #1a1a1a;
        font-size: 13px;
        transition: background-color 0.2s ease;
      }

      .download-link:hover {
        background: #e8e8e8;
        border-color: #4a6fa5;
      }

      .download-link-icon {
        font-size: 16px;
      }

      .download-link-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .download-links-empty {
        font-size: 13px;
        color: #5c6370;
        font-style: italic;
      }

      #tree-container {
        position: relative;
        min-width: 1200px;
        min-height: 800px;
        padding: 50px;
        cursor: grab;
        touch-action: none;
        height: 100%;
      }

      #tree-container.panning {
        cursor: grabbing;
      }

      .node {
        position: absolute;
        z-index: 1000;
        background: white;
        border: 2px solid darkblue;
        border-radius: 4px;
        padding: 10px;
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: all 0.2s ease;
        word-wrap: break-word;
        overflow-wrap: break-word;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      .node:hover {
        box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
        transform: scale(1.02);
      }

      .node.selected {
        border-color: #ff9f1c;
        box-shadow: 0 0 0 3px rgba(255, 159, 28, 0.25);
      }

      .node.node-preview {
        position: relative;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        pointer-events: none;
        cursor: default;
        transform: none;
        transition: none;
      }

      .node-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 4px;
      }

      .node-name {
        font-weight: bold;
        font-size: 14px;
        color: #000;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .node-title-group {
        display: flex;
        align-items: baseline;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
      }

      .node-code {
        font-size: 12px;
        font-weight: normal;
        color: #333;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        margin-left: 3px;
      }

      .tvar {
        font-size: 12px;
        font-weight: 600;
        color: #4a6fa5;
        background: #e6ecff;
        padding: 1px 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .node-type {
        font-size: 12px;
        color: green;
        font-family: Consolas, monospace;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tree-content-layer {
        position: relative;
        min-width: 1200px;
        min-height: 800px;
      }

      .left-panels-wrapper {
        position: absolute;
        top: 50px;
        left: 50px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 5;
      }

      .env-panel {
        position: relative;
        top: 0;
        left: 0;
        box-sizing: border-box;
        background: #ffffff;
        border: 2px solid #99aacc;
        border-radius: 4px;
        padding: 16px 18px;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #1a1a1a;
        transition: opacity 0.2s ease, width 0.2s ease, padding 0.2s ease, max-height 0.2s ease;
      }

      .solver-run-panel {
        position: relative;
        top: 0;
        left: 0;
      }

      .env-panel-body {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .solver-run-panel .env-panel-body {
        margin-top: 0;
      }

      .solver-run-panel .env-panel-content {
        max-height: none;
      }

      .env-panel-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .env-panel-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #4a6fa5;
      }

      .env-panel-solver-run {
        font-size: 16px;
        font-weight: 600;
        color: #1a1a1a;
        padding: 4px 0;
      }

      .env-panel-expression-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .env-panel-expression-title-group {
        display: flex;
        align-items: baseline;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .env-panel-additional {
        font-size: 11px;
        font-style: italic;
        color: #666;
        margin: 0;
      }

      .env-panel-box {
        padding: 10px;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .env-panel-type-text {
        margin: 0;
      }

      .env-panel-placeholder-text {
        font-style: italic;
        color: #666;
        display: block !important;
      }

      .env-panel-hidden {
        visibility: hidden;
      }

      .env-panel.collapsed {
        display: none;
      }

      .env-panel-content {
        font-family: Consolas, monospace;
        font-size: 11px;
        background: #fafafa;
        border: 1px solid #d6d9e2;
        border-radius: 4px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.4;
        color: #222;
        max-height: none;
        overflow: visible;
        user-select: text;
      }

      /* Grid layout only for environment entries */
      .env-panel-section:last-child .env-panel-content {
        display: grid;
        grid-template-columns: max-content max-content auto 1fr;
        column-gap: 8px;
        row-gap: 4px;
        align-items: baseline;
      }

      /* Keep the expression preview visually identical to AST nodes
         (use the same UI font + sizes) so labels like "MK-ARRAY" match */
      .env-panel .node-name,
      .env-panel .node-code,
      .env-panel .tvar {
        font-family: Arial, sans-serif;
      }

      .env-panel .node-name {
        font-size: 14px;
        font-weight: 700;
        color: #000;
      }

      .env-panel .node-code {
        font-size: 12px;
        font-weight: 400;
        color: #333;
      }

      .env-panel .tvar {
        font-size: 12px;
        font-weight: 600;
        color: #4a6fa5;
        background: #e6ecff;
        padding: 1px 6px;
        border-radius: 3px;
      }

      .env-panel-env-row {
        display: contents;
      }

      .env-panel-env-row:last-child {
        margin-bottom: 0;
      }

      .env-panel-env-origin {
        font-style: italic;
        color: #888;
        font-size: 11px;
      }

      .env-panel-env-ident {
        font-weight: 600;
        color: #1a1a1a;
        text-align: right;
      }

      .env-panel-env-colon {
        font-weight: 600;
        color: #1a1a1a;
      }

      .env-panel-env-type-container {
        display: flex;
        align-items: baseline;
        gap: 8px;
        flex-wrap: wrap;
      }

      .env-panel-env-type {
        font-weight: 700;
        color: green;
        font-family: Consolas, monospace;
      }

      .env-panel-content::-webkit-scrollbar {
        width: 8px;
      }

      .env-panel-content::-webkit-scrollbar-thumb {
        background: #c3c7d3;
        border-radius: 4px;
      }

      .connection-line {
        position: absolute;
        background: #333;
        z-index: 1;
      }

      .connection-arrow {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 8px solid #333;
        z-index: 2;
      }

      .input-panel {
        position: absolute;
        top: 650px;
        right: 50px;
        width: 550px;
        height: 200px;
        z-index: 5;
        resize: none;
      }

      .code-container {
        position: relative;
        width: 100%;
        height: 300px;
        min-height: 200px;
        flex: 1;
        overflow: hidden;
        border-radius: 4px;
      }

      .code-textarea,
      .code-highlighted {
        font-family: Consolas, Monaco, 'Courier New', monospace;
        font-size: 18px;
        line-height: 1.5;
        padding: 12px;
        margin: 0;
        border: none;
        border-radius: 4px;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: break-word;
        box-sizing: border-box;
      }

      .code-highlighted {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        color: #222;
        pointer-events: none;
        z-index: 1;
        overflow: auto;
      }

      .code-textarea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        color: transparent;
        background: transparent;
        caret-color: #222;
        resize: none;
        outline: none;
        border: none;
        z-index: 2;
        overflow: auto;
      }

      .code-textarea::selection {
        background: rgba(181, 213, 255, 0.8);
      }

      .code-panel-header {
        cursor: move;
        user-select: none;
      }

      .code-highlighted pre {
        margin: 0;
        padding: 0;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
        white-space: inherit;
        overflow: inherit;
      }

      .resize-handle {
        position: absolute;
        right: 0;
        bottom: 0;
        width: 16px;
        height: 16px;
        cursor: nwse-resize;
        background: linear-gradient(
          135deg,
          transparent 0%,
          transparent 50%,
          #99aacc 50%,
          #99aacc 100%
        );
        border-bottom-right-radius: 4px;
        z-index: 10;
      }

      .resize-handle:hover {
        background: linear-gradient(
          135deg,
          transparent 0%,
          transparent 50%,
          #4a6fa5 50%,
          #4a6fa5 100%
        );
      }


      .solver-error-box {
        color: red;
        font-family: Consolas, monospace;
        margin-top: 0px;
        margin-bottom: 16px;
        padding: 5px;
        border: 1px solid red;
        border-radius: 4px;
      }

      /* Must come last to override all other .tvar styles */
      .solver-run-panel .first-constraint-left .tvar,
      .solver-run-panel .first-constraint-left .tvar.highlight {
        background-color: #37f188 !important;
        border: 2px solid #4a6fa5 !important;
      }
    </style>
    <script src="./data/data.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="container">
        <div id="tree-container"></div>
      </div>
      <aside id="sidebar">
        <h2>Solver Runs</h2>
        <div id="run-buttons"></div>

        <div class="control-section">
          <h2>Control</h2>
          <div class="control-item">
            <input type="checkbox" id="env-panel-toggle" autocomplete="off" />
            <label for="env-panel-toggle">Show Type Panel</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="solver-run-panel-toggle" autocomplete="off" checked />
            <label for="solver-run-panel-toggle">Show Solver Run Panel</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="code-panel-toggle" autocomplete="off" checked />
            <label for="code-panel-toggle">Show Code Panel</label>
          </div>
          <div class="control-item">
            <input type="checkbox" id="select-first-tvar" autocomplete="off" />
            <label for="select-first-tvar">Select 1st tvar</label>
          </div>
          
          <div class="control-textarea-container">
            <label for="control-code-text">Code Text:</label>
            <textarea 
              id="control-code-text" 
              class="control-textarea"
              placeholder="Type here to update the Code panel..."
              rows="6"
              autocomplete="off"
            ></textarea>
          </div>
        </div>

        <div class="gif-section">
          <h2>GIF Creation</h2>
          <div class="gif-controls">
            <div class="gif-control-group">
              <label for="gif-runs-input">Run Numbers (space-separated):</label>
              <input
                type="text"
                id="gif-runs-input"
                placeholder="e.g., 1 3 5 7 (empty = all)"
                autocomplete="off"
              />
            </div>
            <div class="gif-control-group">
              <label for="gif-duration-input">Frame Duration (ms):</label>
              <input
                type="number"
                id="gif-duration-input"
                value="500"
                min="100"
                step="100"
                autocomplete="off"
              />
            </div>
            <button id="gif-create-button" class="gif-create-button">
              Create GIF
            </button>
          </div>
        </div>

        <div class="screenshot-section">
          <h2>Screenshot</h2>
          <button id="screenshot-button" class="screenshot-button">
            Take Screenshot
          </button>
        </div>

        <div class="downloads-section">
          <div class="downloads-header">
            <h2>Downloads</h2>
            <button id="download-all-button" class="download-all-button" disabled>
              Download All
            </button>
          </div>
          <div id="download-links" class="download-links">
            <!-- Download links will be added here dynamically -->
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
