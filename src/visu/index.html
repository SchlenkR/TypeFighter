<!DOCTYPE html>
<html>
  <head>
    <title>TypeFighter Tree Visualization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: lightblue;
      }

      #app {
        display: flex;
        height: 100%;
        width: 100%;
      }

      #container {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden;
        padding: 50px;
        box-sizing: border-box;
        min-width: 0;
        height: 100%;
      }

      #sidebar {
        flex: 0 0 240px;
        box-sizing: border-box;
        padding: 40px 24px;
        border-left: 1px solid #d0d7de;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
        height: 100%;
        scrollbar-width: none;
      }

      #sidebar::-webkit-scrollbar {
        width: 0;
        height: 0;
      }

      #sidebar h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #1a1a1a;
      }

      #run-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1 1 auto;
      }

      .run-button {
        border: 1px solid #b6beca;
        background: #ffffff;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 14px;
        text-align: left;
        cursor: pointer;
        transition: background-color 0.2s ease, border-color 0.2s ease,
          color 0.2s ease;
      }

      .run-button:hover {
        background: #edf2ff;
        border-color: #4a6fa5;
      }

      .run-button.active {
        background: #4a6fa5;
        border-color: #36527a;
        color: #ffffff;
      }

      .run-buttons-empty {
        font-size: 14px;
        color: #5c6370;
      }

      #tree-container {
        position: relative;
        min-width: 1200px;
        min-height: 800px;
        padding: 50px;
        cursor: grab;
        touch-action: none;
        height: 100%;
      }

      #tree-container.panning {
        cursor: grabbing;
      }

      .node {
        position: absolute;
        z-index: 1000;
        background: white;
        border: 2px solid darkblue;
        border-radius: 4px;
        padding: 10px;
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: all 0.2s ease;
        word-wrap: break-word;
        overflow-wrap: break-word;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      .node:hover {
        box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
        transform: scale(1.02);
      }

      .node.selected {
        border-color: #ff9f1c;
        box-shadow: 0 0 0 3px rgba(255, 159, 28, 0.25);
      }

      .node.node-preview {
        position: relative;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        pointer-events: none;
        cursor: default;
        transform: none;
        transition: none;
      }

      .node-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 4px;
      }

      .node-name {
        font-weight: bold;
        font-size: 14px;
        color: #000;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .node-title-group {
        display: flex;
        align-items: baseline;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
      }

      .node-code {
        font-size: 12px;
        font-weight: normal;
        color: #333;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        margin-left: 3px;
      }

      .tvar {
        font-size: 12px;
        font-weight: 600;
        color: #4a6fa5;
        background: #e6ecff;
        padding: 1px 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .node-type {
        font-size: 12px;
        color: green;
        font-family: Consolas, monospace;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tree-content-layer {
        position: relative;
        min-width: 1200px;
        min-height: 800px;
      }

      .env-panel {
        position: absolute;
        top: 0;
        left: 0;
        box-sizing: border-box;
        background: #ffffff;
        border: 2px solid #99aacc;
        border-radius: 4px;
        padding: 16px 18px;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #1a1a1a;
        z-index: 5;
      }

      .env-panel-body {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .env-panel-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .env-panel-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #4a6fa5;
      }

      .env-panel-expression-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .env-panel-expression-title-group {
        display: flex;
        align-items: baseline;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .env-panel-additional {
        font-size: 11px;
        font-style: italic;
        color: #666;
        margin: 0;
      }

      .env-panel-box {
        padding: 10px;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .env-panel-type-text {
        margin: 0;
      }

      .env-panel-placeholder-text {
        font-style: italic;
        color: #666;
      }

      .env-panel-hidden {
        display: none !important;
      }

      .env-panel-content {
        font-family: Consolas, monospace;
        font-size: 11px;
        background: #f7f7fb;
        border: 1px solid #d6d9e2;
        border-radius: 4px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.4;
        color: #222;
        max-height: 240px;
        overflow-y: auto;
        user-select: text;
      }

      .env-panel-env-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 4px;
      }

      .env-panel-env-row:last-child {
        margin-bottom: 0;
      }

      .env-panel-env-ident {
        font-weight: 600;
        color: #1a1a1a;
      }

      .env-panel-env-type {
        font-weight: 700;
        color: green;
        font-family: Consolas, monospace;
      }

      .env-panel-content::-webkit-scrollbar {
        width: 8px;
      }

      .env-panel-content::-webkit-scrollbar-thumb {
        background: #c3c7d3;
        border-radius: 4px;
      }

      .connection-line {
        position: absolute;
        background: #333;
        z-index: 1;
      }

      .connection-arrow {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 8px solid #333;
        z-index: 2;
      }
    </style>
    <script src="./data/data.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div id="container">
        <div id="tree-container"></div>
      </div>
      <aside id="sidebar">
        <h2>Solver Runs</h2>
        <div id="run-buttons"></div>
      </aside>
    </div>
  </body>
</html>
