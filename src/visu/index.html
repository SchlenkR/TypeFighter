<!DOCTYPE html>
<html>
  <head>
    <title>TypeFighter Tree Visualization</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        padding: 50px;
        font-family: Arial, sans-serif;
        background-color: white;
      }

      #container {
        width: 100%;
        height: 100vh;
        overflow: auto;
      }

      #tree-container {
        position: relative;
        min-width: 1200px;
        min-height: 800px;
        padding: 50px;
        cursor: grab;
        touch-action: none;
      }

      #tree-container.panning {
        cursor: grabbing;
      }

      .node {
        position: absolute;
        background: white;
        border: 2px solid darkblue;
        border-radius: 4px;
        padding: 10px;
        box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: all 0.2s ease;
        word-wrap: break-word;
        overflow-wrap: break-word;
        user-select: none;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
      }

      .node:hover {
        box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
        transform: scale(1.02);
      }

      .node.selected {
        border-color: #ff9f1c;
        box-shadow: 0 0 0 3px rgba(255, 159, 28, 0.25);
      }

      .node.node-preview {
        position: relative;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        pointer-events: none;
        cursor: default;
        transform: none;
        transition: none;
      }

      .node-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 4px;
      }

      .node-name {
        font-weight: bold;
        font-size: 14px;
        color: #000;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .node-title-group {
        display: flex;
        align-items: baseline;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
      }

      .node-code {
        font-size: 12px;
        font-weight: normal;
        color: #333;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        margin-left: 3px;
      }

      .tvar {
        font-size: 12px;
        font-weight: 600;
        color: #4a6fa5;
        background: #e6ecff;
        padding: 1px 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      .node-type {
        font-size: 12px;
        color: green;
        font-weight: bolder;
        font-family: Consolas, monospace;
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tree-content-layer {
        position: relative;
        min-width: 1200px;
        min-height: 800px;
      }

      .env-panel {
        position: absolute;
        top: 0;
        left: 0;
        box-sizing: border-box;
        background: #ffffff;
        border: 2px solid #99aacc;
        border-radius: 4px;
        padding: 16px 18px;
        box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.15);
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #1a1a1a;
        z-index: 5;
      }

      .env-panel-body {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .env-panel-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .env-panel-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #4a6fa5;
      }

      .env-panel-expression-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .env-panel-expression-title-group {
        display: flex;
        align-items: baseline;
        gap: 6px;
        flex: 1 1 auto;
        min-width: 0;
      }

      .env-panel-additional {
        font-size: 11px;
        font-style: italic;
        color: #666;
        margin: 0;
      }

      .env-panel-box {
        /* border: 1px solid darkblue;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            border-radius: 4px; */
        padding: 10px;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .env-panel-type-text {
        margin: 0;
      }

      .env-panel-placeholder-text {
        font-style: italic;
        color: #666;
      }

      .env-panel-hidden {
        display: none !important;
      }

      .env-panel-content {
        font-family: Consolas, monospace;
        font-size: 11px;
        background: #f7f7fb;
        border: 1px solid #d6d9e2;
        border-radius: 4px;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.4;
        color: #222;
        max-height: 240px;
        overflow-y: auto;
        user-select: text;
      }

      .env-panel-env-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 4px;
      }

      .env-panel-env-row:last-child {
        margin-bottom: 0;
      }

      .env-panel-env-ident {
        font-weight: 600;
        color: #1a1a1a;
      }

      .env-panel-env-type {
        font-weight: 700;
        color: green;
        font-family: Consolas, monospace;
      }

      .env-panel-content::-webkit-scrollbar {
        width: 8px;
      }

      .env-panel-content::-webkit-scrollbar-thumb {
        background: #c3c7d3;
        border-radius: 4px;
      }

      .connection-line {
        position: absolute;
        background: #333;
        z-index: 1;
      }

      .connection-arrow {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 8px solid #333;
        z-index: 2;
      }
    </style>
    <script src="./data/data.js"></script>
  </head>
  <body>
    <div id="container">
      <div id="tree-container"></div>
    </div>

    <script>
      class TreeVisualizer {
        constructor() {
          this.levelHeight = 140;
          this.minNodeWidth = 90;
          this.maxNodeWidth = 550;
          this.minNodeSpacing = 50; // Minimum spacing between adjacent nodes
          this.subtreeSpacing = 50; // Spacing between child subtrees
          this.minLevelHeight = 40;
          this.maxLevelHeight = 320;

          this.envPanelWidth = 350;
          this.envPanelSpacing = 80;
          this.envPanelDefaultText =
            'Hover or select a node to inspect the environment';
          this.envPanelNodePlaceholderText = '\u00a0';
          this.minZoom = 0.25;
          this.maxZoom = 4;
          this.zoomLevel = 1;
          this.panX = 0;
          this.panY = 0;
          this.isPanning = false;
          this.activePointerId = null;
          this.lastPanPosition = { x: 0, y: 0 };

          this.nodes = new Map();
          this.links = [];
          this.nodePositions = new Map();
          this.nodeWidths = new Map(); // Store calculated widths for each node
          this.nodeHeights = new Map(); // Store calculated heights for each node
          this.container = document.getElementById('tree-container');
          this.envPanel = this.createEnvPanel();
          this.contentLayer = this.createContentLayer();
          this.container.appendChild(this.envPanel);
          this.container.appendChild(this.contentLayer);
          this.hoveredNodeKey = null;
          this.selectedNodeKey = null;
          this.didPan = false;
          this.handleEnvPanelMouseLeave =
            this.handleEnvPanelMouseLeave.bind(this);
          this.envPanel.addEventListener(
            'mouseleave',
            this.handleEnvPanelMouseLeave
          );
          this.measurementContainer = this.createMeasurementContainer();
          this.handlePointerDown = this.handlePointerDown.bind(this);
          this.handlePointerMove = this.handlePointerMove.bind(this);
          this.handlePointerUp = this.handlePointerUp.bind(this);
          this.handleContainerClick = this.handleContainerClick.bind(this);

          this.refreshEnvPanel();
          this.updateEnvPanelLayout();
          this.setupInteraction();
          this.init();
          this.applyTransform();
        }

        createMeasurementContainer() {
          const measurementHost = document.createElement('div');
          measurementHost.style.position = 'absolute';
          measurementHost.style.visibility = 'hidden';
          measurementHost.style.pointerEvents = 'none';
          measurementHost.style.left = '-10000px';
          measurementHost.style.top = '-10000px';
          measurementHost.style.width = 'auto';
          measurementHost.style.height = 'auto';
          document.body.appendChild(measurementHost);
          return measurementHost;
        }

        createEnvPanel() {
          const panel = document.createElement('div');
          panel.className = 'env-panel';

          const body = document.createElement('div');
          body.className = 'env-panel-body';
          panel.appendChild(body);

          const expressionSection = document.createElement('div');
          expressionSection.className = 'env-panel-section';
          body.appendChild(expressionSection);

          const expressionTitle = document.createElement('div');
          expressionTitle.className = 'env-panel-section-title';
          expressionTitle.textContent = 'EXPRESSION:';
          expressionSection.appendChild(expressionTitle);

          const expressionBox = document.createElement('div');
          expressionBox.className = 'env-panel-box env-panel-content';
          expressionSection.appendChild(expressionBox);

          const expressionHeader = document.createElement('div');
          expressionHeader.className =
            'node-header env-panel-expression-header';
          expressionBox.appendChild(expressionHeader);

          const expressionTitleGroup = document.createElement('div');
          expressionTitleGroup.className =
            'node-title-group env-panel-expression-title-group';
          expressionHeader.appendChild(expressionTitleGroup);

          const expressionName = document.createElement('div');
          expressionName.className = 'node-name env-panel-expression-name';
          expressionTitleGroup.appendChild(expressionName);

          const expressionCode = document.createElement('div');
          expressionCode.className = 'node-code env-panel-expression-code';
          expressionTitleGroup.appendChild(expressionCode);

          const expressionVar = document.createElement('div');
          expressionVar.className = 'tvar env-panel-expression-var';
          expressionHeader.appendChild(expressionVar);

          const expressionAdditional = document.createElement('div');
          expressionAdditional.className =
            'node-code env-panel-additional env-panel-placeholder-text';
          expressionAdditional.textContent = '\u00a0';
          expressionBox.appendChild(expressionAdditional);

          const typeSection = document.createElement('div');
          typeSection.className = 'env-panel-section';
          body.appendChild(typeSection);

          const typeTitle = document.createElement('div');
          typeTitle.className = 'env-panel-section-title';
          typeTitle.textContent = 'TYPE';
          typeSection.appendChild(typeTitle);

          const typeBox = document.createElement('div');
          typeBox.className = 'env-panel-box env-panel-content';
          typeSection.appendChild(typeBox);

          const typeText = document.createElement('div');
          typeText.className = 'node-type env-panel-type-text';
          typeBox.appendChild(typeText);

          const envSection = document.createElement('div');
          envSection.className = 'env-panel-section';
          body.appendChild(envSection);

          const envSectionTitle = document.createElement('div');
          envSectionTitle.className = 'env-panel-section-title';
          envSectionTitle.textContent = 'ENVIRONMENT';
          envSection.appendChild(envSectionTitle);

          const envContent = document.createElement('div');
          envContent.className = 'env-panel-content';
          envSection.appendChild(envContent);

          this.envPanelExpressionNameEl = expressionName;
          this.envPanelExpressionCodeEl = expressionCode;
          this.envPanelExpressionVarEl = expressionVar;
          this.envPanelAdditionalEl = expressionAdditional;
          this.envPanelTypeTextEl = typeText;
          this.envPanelEnvContent = envContent;

          return panel;
        }

        createContentLayer() {
          const layer = document.createElement('div');
          layer.className = 'tree-content-layer';
          layer.style.paddingTop = '0px';
          layer.style.paddingRight = '0px';
          layer.style.paddingBottom = '0px';
          return layer;
        }

        setEnvPanelText(text) {
          const content = this.envPanelEnvContent;
          if (!content) {
            return;
          }
          const trimmed = text && text.trim().length > 0 ? text : '\u00a0';
          content.textContent = trimmed;
          if (trimmed === this.envPanelDefaultText || trimmed === '\u00a0') {
            content.classList.add('env-panel-placeholder-text');
          } else {
            content.classList.remove('env-panel-placeholder-text');
          }
          content.scrollTop = 0;
        }

        updateEnvPanelNodePreview(node) {
          const nameEl = this.envPanelExpressionNameEl;
          const codeEl = this.envPanelExpressionCodeEl;
          const varEl = this.envPanelExpressionVarEl;
          const additionalEl = this.envPanelAdditionalEl;
          const typeEl = this.envPanelTypeTextEl;

          if (!nameEl || !codeEl || !varEl || !additionalEl || !typeEl) {
            return;
          }

          const placeholderText = this.envPanelNodePlaceholderText;

          if (!node) {
            nameEl.textContent = placeholderText;
            nameEl.classList.add('env-panel-placeholder-text');

            codeEl.textContent = '';
            codeEl.classList.add('env-panel-hidden');

            varEl.textContent = '';
            varEl.classList.add('env-panel-hidden');

            additionalEl.textContent = '\u00a0';
            additionalEl.classList.remove('env-panel-hidden');
            additionalEl.classList.add('env-panel-placeholder-text');

            typeEl.textContent = '\u00a0';
            typeEl.classList.add('env-panel-placeholder-text');
            return;
          }

          const nameText =
            node.name && node.name.trim().length
              ? node.name
              : '(unnamed expression)';
          nameEl.textContent = nameText;
          nameEl.classList.remove('env-panel-placeholder-text');

          if (node.code && node.code.trim()) {
            codeEl.textContent = node.code;
            codeEl.classList.remove('env-panel-hidden');
          } else {
            codeEl.textContent = '';
            codeEl.classList.add('env-panel-hidden');
          }

          const varLabel =
            typeof node.varNum !== 'undefined' ? 'tv_' + node.varNum : '';
          if (varLabel) {
            varEl.textContent = varLabel;
            varEl.classList.remove('env-panel-hidden');
          } else {
            varEl.textContent = '';
            varEl.classList.add('env-panel-hidden');
          }

          if (node.additionalInfo && node.additionalInfo.trim()) {
            additionalEl.textContent = node.additionalInfo;
            additionalEl.classList.remove('env-panel-hidden');
            additionalEl.classList.remove('env-panel-placeholder-text');
          } else {
            additionalEl.textContent = '\u00a0';
            additionalEl.classList.remove('env-panel-hidden');
            additionalEl.classList.add('env-panel-placeholder-text');
          }

          if (node.exprTyp && node.exprTyp.trim()) {
            typeEl.textContent = node.exprTyp;
            typeEl.classList.remove('env-panel-placeholder-text');
          } else {
            typeEl.textContent = '\u00a0';
            typeEl.classList.add('env-panel-placeholder-text');
          }
        }

        normalizeEnvironmentEntry(entry) {
          if (!entry || typeof entry !== 'object') {
            return null;
          }

          const ident =
            typeof entry.ident === 'string' && entry.ident.trim().length
              ? entry.ident.trim()
              : '(anonymous)';

          const hasVarNum = entry.varNum !== undefined && entry.varNum !== null;
          const varLabel = hasVarNum ? `tv_${String(entry.varNum)}` : null;

          const typeLabel =
            typeof entry.solvedTyp === 'string' && entry.solvedTyp.trim().length
              ? entry.solvedTyp.trim()
              : null;

          return { ident, varLabel, typeLabel };
        }

        renderEnvironmentEntries(rawEnv) {
          const content = this.envPanelEnvContent;
          if (!content) {
            return false;
          }

          let entries = [];

          if (Array.isArray(rawEnv)) {
            entries = rawEnv
              .map(entry => this.normalizeEnvironmentEntry(entry))
              .filter(entry => entry !== null);
          } else if (rawEnv && typeof rawEnv === 'object') {
            const single = this.normalizeEnvironmentEntry(rawEnv);
            if (single) {
              entries = [single];
            }
          }

          if (entries.length === 0) {
            return false;
          }

          content.classList.remove('env-panel-placeholder-text');
          content.innerHTML = '';

          entries.forEach(entry => {
            const row = document.createElement('div');
            row.className = 'env-panel-env-row';

            const identSpan = document.createElement('span');
            identSpan.className = 'env-panel-env-ident';
            identSpan.textContent = entry.ident;
            row.appendChild(identSpan);

            if (entry.varLabel) {
              const varSpan = document.createElement('span');
              varSpan.className = 'tvar';
              varSpan.textContent = entry.varLabel;
              row.appendChild(varSpan);
            }

            if (entry.typeLabel) {
              const typeSpan = document.createElement('span');
              typeSpan.className = 'env-panel-env-type';
              typeSpan.textContent = entry.typeLabel;
              row.appendChild(typeSpan);
            }

            content.appendChild(row);
          });

          return true;
        }

        resolveEnvText(rawEnv) {
          if (Array.isArray(rawEnv)) {
            const lines = rawEnv
              .map(entry => this.normalizeEnvironmentEntry(entry))
              .filter(entry => entry !== null)
              .map(entry => {
                if (entry.varLabel && entry.typeLabel) {
                  return `${entry.ident}: ${entry.varLabel} (${entry.typeLabel})`;
                }
                if (entry.varLabel) {
                  return `${entry.ident}: ${entry.varLabel}`;
                }
                if (entry.typeLabel) {
                  return `${entry.ident}: ${entry.typeLabel}`;
                }
                return entry.ident;
              });

            if (lines.length === 0) {
              return '\u00a0';
            }

            return lines.join('\n');
          }

          if (rawEnv === null || rawEnv === undefined) {
            return '\u00a0';
          }

          if (typeof rawEnv === 'string') {
            const trimmed = rawEnv.trim();
            return trimmed.length > 0 ? trimmed : '\u00a0';
          }

          if (typeof rawEnv === 'object') {
            const rendered = this.normalizeEnvironmentEntry(rawEnv);
            if (!rendered) {
              return '\u00a0';
            }

            if (rendered.varLabel && rendered.typeLabel) {
              return `${rendered.ident}: ${rendered.varLabel} (${rendered.typeLabel})`;
            }

            if (rendered.varLabel) {
              return `${rendered.ident}: ${rendered.varLabel}`;
            }

            if (rendered.typeLabel) {
              return `${rendered.ident}: ${rendered.typeLabel}`;
            }

            return rendered.ident;
          }

          const fallback = String(rawEnv).trim();
          return fallback.length > 0 ? fallback : '\u00a0';
        }

        setEnvPanelEnvironment(rawEnv) {
          if (this.renderEnvironmentEntries(rawEnv)) {
            return;
          }

          const text = this.resolveEnvText(rawEnv);
          this.setEnvPanelText(text);
        }

        updateEnvPanelLayout() {
          if (!this.envPanel || !this.contentLayer) {
            return;
          }

          const scale = this.zoomLevel;

          this.envPanel.style.width = this.envPanelWidth + 'px';
          this.envPanel.style.transformOrigin = 'top left';
          this.envPanel.style.transform = `scale(${scale})`;

          const basePadding = this.envPanelWidth + this.envPanelSpacing;
          this.contentLayer.style.paddingLeft = basePadding + 'px';
        }

        init() {
          // Parse data
          this.parseData();
          // Calculate node widths and heights based on content
          this.calculateNodeDimensions();
          // Calculate layout
          this.calculateLayout();
          // Render tree
          this.render();
        }

        parseData() {
          // Create nodes map
          window.nodeDataArray.forEach(nodeData => {
            this.nodes.set(nodeData.key, {
              ...nodeData,
              children: [],
              parents: [],
            });
          });

          // Create links and establish parent-child relationships
          window.linkDataArray.forEach(link => {
            const parent = this.nodes.get(link.from);
            const child = this.nodes.get(link.to);

            if (parent && child) {
              parent.children.push(child);
              child.parents.push(parent);
              this.links.push({ parent, child });
            }
          });
        }

        calculateNodeDimensions() {
          this.measurementContainer.innerHTML = '';

          this.nodes.forEach(node => {
            const measurementElement = this.buildNodeElement(node);
            // Let the browser lay out the node exactly as it will appear.
            measurementElement.style.position = 'static';
            measurementElement.style.left = 'auto';
            measurementElement.style.top = 'auto';
            measurementElement.style.width = 'auto';

            this.measurementContainer.appendChild(measurementElement);

            const naturalWidth = measurementElement.offsetWidth;
            const clampedWidth = Math.max(
              this.minNodeWidth,
              Math.min(this.maxNodeWidth, naturalWidth)
            );

            if (clampedWidth !== naturalWidth) {
              measurementElement.style.width = clampedWidth + 'px';
            }

            const finalHeight = measurementElement.offsetHeight;

            this.nodeWidths.set(node.key, clampedWidth);
            this.nodeHeights.set(node.key, finalHeight);

            this.measurementContainer.removeChild(measurementElement);
          });
        }

        calculateLayout() {
          // Find root nodes (nodes with no parents)
          const roots = Array.from(this.nodes.values()).filter(
            node => node.parents.length === 0
          );

          // Calculate positions using a bottom-up approach first to determine subtree widths
          const subtreeWidths = new Map();
          roots.forEach(root => {
            this.calculateSubtreeWidth(root, subtreeWidths, new Set());
          });

          // Now position nodes from left to right
          let currentX = 50;
          roots.forEach(root => {
            currentX = this.positionSubtree(
              root,
              0,
              currentX,
              subtreeWidths,
              new Set()
            );
            currentX += 50; // Add spacing between root subtrees
          });
        }

        calculateSubtreeWidth(node, subtreeWidths, visited) {
          if (visited.has(node.key)) {
            return subtreeWidths.get(node.key) || 0;
          }
          visited.add(node.key);

          const nodeWidth = this.nodeWidths.get(node.key);

          if (node.children.length === 0) {
            // Leaf node - width is just the node width
            subtreeWidths.set(node.key, nodeWidth);
            return nodeWidth;
          } else {
            // Internal node - width is the sum of children widths plus spacing
            let childrenTotalWidth = 0;
            node.children.forEach((child, index) => {
              const childSubtreeWidth = this.calculateSubtreeWidth(
                child,
                subtreeWidths,
                visited
              );
              childrenTotalWidth += childSubtreeWidth;
              if (index < node.children.length - 1) {
                const spacing = Math.max(
                  this.subtreeSpacing,
                  this.minNodeSpacing
                );
                childrenTotalWidth += spacing; // Spacing between child subtrees
              }
            });

            // Subtree width is the maximum of node width and children total width
            const subtreeWidth = Math.max(nodeWidth, childrenTotalWidth);
            subtreeWidths.set(node.key, subtreeWidth);
            return subtreeWidth;
          }
        }

        positionSubtree(node, level, startX, subtreeWidths, visited) {
          if (visited.has(node.key)) {
            return startX;
          }
          visited.add(node.key);

          const y = level * this.levelHeight + 50;
          const nodeWidth = this.nodeWidths.get(node.key);
          const subtreeWidth = subtreeWidths.get(node.key);

          if (node.children.length === 0) {
            // Leaf node - just position it
            this.nodePositions.set(node.key, { x: startX, y });
            return startX + subtreeWidth;
          } else {
            // Position children first
            let currentChildX = startX;
            const childPositions = [];

            node.children.forEach((child, index) => {
              const childStartX = currentChildX;
              currentChildX = this.positionSubtree(
                child,
                level + 1,
                childStartX,
                subtreeWidths,
                visited
              );
              childPositions.push(this.nodePositions.get(child.key));

              if (index < node.children.length - 1) {
                currentChildX += this.subtreeSpacing; // Spacing between child subtrees
              }
            });

            // Ensure minimum spacing between adjacent child nodes
            this.enforceMinimumSpacing(node.children, level + 1);

            // Center parent over children (recalculate positions after spacing adjustment)
            const updatedChildPositions = node.children.map(child =>
              this.nodePositions.get(child.key)
            );
            if (updatedChildPositions.length > 0) {
              const leftmostChild = Math.min(
                ...updatedChildPositions.map(pos => pos.x)
              );
              const rightmostChild = Math.max(
                ...updatedChildPositions.map(
                  (pos, index) =>
                    pos.x + this.nodeWidths.get(node.children[index].key)
                )
              );
              const childrenCenter = (leftmostChild + rightmostChild) / 2;
              const parentX = childrenCenter - nodeWidth / 2;

              // Ensure parent doesn't go outside the subtree bounds
              const minParentX = startX;
              const maxParentX = startX + subtreeWidth - nodeWidth;
              const finalParentX = Math.max(
                minParentX,
                Math.min(maxParentX, parentX)
              );

              this.nodePositions.set(node.key, { x: finalParentX, y });

              if (node.children.length === 1) {
                // Align single-child subtrees so the connector remains vertical
                const child = node.children[0];
                if (!child.parents || child.parents.length === 1) {
                  const childPos = this.nodePositions.get(child.key);
                  const childWidth = this.nodeWidths.get(child.key);
                  if (childPos && typeof childWidth === 'number') {
                    const parentCenterX = finalParentX + nodeWidth / 2;
                    const childCenterX = childPos.x + childWidth / 2;
                    const delta = parentCenterX - childCenterX;
                    if (Math.abs(delta) > 0.5) {
                      this.shiftSubtree(child, delta);
                    }
                  }
                }
              }
            } else {
              this.nodePositions.set(node.key, { x: startX, y });
            }

            return startX + subtreeWidth;
          }
        }

        enforceMinimumSpacing(children, level) {
          if (children.length <= 1) return;

          // Sort children by their current x position
          const sortedChildren = [...children].sort((a, b) => {
            const posA = this.nodePositions.get(a.key);
            const posB = this.nodePositions.get(b.key);
            return posA.x - posB.x;
          });

          // Adjust positions to maintain minimum spacing
          for (let i = 1; i < sortedChildren.length; i++) {
            const prevChild = sortedChildren[i - 1];
            const currentChild = sortedChildren[i];

            const prevPos = this.nodePositions.get(prevChild.key);
            const currentPos = this.nodePositions.get(currentChild.key);
            const prevWidth = this.nodeWidths.get(prevChild.key);

            const minX = prevPos.x + prevWidth + this.minNodeSpacing;

            if (currentPos.x < minX) {
              // Need to move this node and all subsequent nodes to the right
              const shift = minX - currentPos.x;
              for (let j = i; j < sortedChildren.length; j++) {
                const nodeToShift = sortedChildren[j];
                const posToShift = this.nodePositions.get(nodeToShift.key);
                this.nodePositions.set(nodeToShift.key, {
                  x: posToShift.x + shift,
                  y: posToShift.y,
                });
              }
            }
          }
        }

        shiftSubtree(node, deltaX) {
          if (!node || deltaX === 0) {
            return;
          }

          const visited = new Set();
          const stack = [node];

          while (stack.length > 0) {
            const current = stack.pop();
            if (!current || visited.has(current.key)) {
              continue;
            }
            visited.add(current.key);

            const pos = this.nodePositions.get(current.key);
            if (pos) {
              this.nodePositions.set(current.key, {
                x: pos.x + deltaX,
                y: pos.y,
              });
            }

            if (!current.children || current.children.length === 0) {
              continue;
            }

            current.children.forEach(childNode => {
              // Skip shared nodes to avoid conflicting adjustments when a node has multiple parents
              if (!childNode.parents || childNode.parents.length === 1) {
                stack.push(childNode);
              }
            });
          }
        }

        render() {
          this.contentLayer.innerHTML = '';
          this.hoveredNodeKey = null;

          // Render nodes first
          this.nodes.forEach(node => {
            this.renderNode(node);
          });

          // Now that nodes are rendered, measure their actual heights and render connections
          this.updateActualNodeHeights();
          this.renderConnections();
          this.updateSelectionHighlight();
          this.refreshEnvPanel();
          this.applyTransform();
        }

        updateActualNodeHeights() {
          // Get actual rendered heights from the DOM
          this.nodes.forEach(node => {
            const nodeElement = this.contentLayer.querySelector(
              `.node[data-key="${node.key}"]`
            );
            if (nodeElement) {
              const actualHeight = nodeElement.offsetHeight;
              this.nodeHeights.set(node.key, actualHeight);
            }
          });
        }

        renderConnections() {
          // Group children by parent to draw connections properly
          const parentToChildren = new Map();

          this.links.forEach(link => {
            if (!parentToChildren.has(link.parent.key)) {
              parentToChildren.set(link.parent.key, []);
            }
            parentToChildren.get(link.parent.key).push(link.child);
          });

          // Render connections for each parent and its children
          parentToChildren.forEach((children, parentKey) => {
            const parentElement = this.contentLayer.querySelector(
              `.node[data-key="${parentKey}"]`
            );
            if (!parentElement) return;

            const parentCenterX =
              parentElement.offsetLeft + parentElement.offsetWidth / 2;
            const parentBottomY =
              parentElement.offsetTop + parentElement.offsetHeight;

            // Calculate the span of children
            const childDetails = children
              .map(child => {
                const childElement = this.contentLayer.querySelector(
                  `.node[data-key="${child.key}"]`
                );
                if (!childElement) {
                  return null;
                }
                return {
                  centerX:
                    childElement.offsetLeft + childElement.offsetWidth / 2,
                  topY: childElement.offsetTop,
                };
              })
              .filter(detail => detail !== null);

            if (childDetails.length === 0) return;

            const minChildTop = Math.min(
              ...childDetails.map(detail => detail.topY)
            );
            const gapBetweenLevels = Math.max(0, minChildTop - parentBottomY);
            const verticalDropDistance = gapBetweenLevels / 2;
            const horizontalLineY = parentBottomY + verticalDropDistance;

            // Draw single vertical line from parent (same height as child drop)
            const parentVerticalLine = document.createElement('div');
            parentVerticalLine.className = 'connection-line';
            parentVerticalLine.style.left = parentCenterX + 'px';
            parentVerticalLine.style.top = parentBottomY + 'px';
            parentVerticalLine.style.width = '2px';
            parentVerticalLine.style.height = verticalDropDistance + 'px';
            this.contentLayer.appendChild(parentVerticalLine);

            const minChildX = Math.min(
              ...childDetails.map(detail => detail.centerX)
            );
            const maxChildX = Math.max(
              ...childDetails.map(detail => detail.centerX)
            );

            // Draw horizontal line spanning all children
            const horizontalLine = document.createElement('div');
            horizontalLine.className = 'connection-line';
            horizontalLine.style.left = minChildX + 'px';
            horizontalLine.style.top = horizontalLineY + 'px';
            horizontalLine.style.width = maxChildX - minChildX + 'px';
            horizontalLine.style.height = '2px';
            this.contentLayer.appendChild(horizontalLine);

            // Draw vertical lines to each child
            childDetails.forEach(detail => {
              const { centerX, topY } = detail;

              // Vertical line to child
              const childVerticalLine = document.createElement('div');
              childVerticalLine.className = 'connection-line';
              childVerticalLine.style.left = centerX + 'px';
              childVerticalLine.style.top = horizontalLineY + 'px';
              childVerticalLine.style.width = '2px';
              childVerticalLine.style.height = topY - horizontalLineY + 'px';
              this.contentLayer.appendChild(childVerticalLine);

              // Arrow at child
              const arrow = document.createElement('div');
              arrow.className = 'connection-arrow';
              arrow.style.left = centerX - 6 + 'px';
              arrow.style.top = topY - 8 + 'px';
              this.contentLayer.appendChild(arrow);
            });
          });
        }

        setupInteraction() {
          this.container.addEventListener(
            'pointerdown',
            this.handlePointerDown
          );
          window.addEventListener('pointermove', this.handlePointerMove);
          window.addEventListener('pointerup', this.handlePointerUp);
          window.addEventListener('pointercancel', this.handlePointerUp);
          this.container.addEventListener('click', this.handleContainerClick);
          this.container.addEventListener(
            'wheel',
            event => {
              if (this.envPanel && this.envPanel.contains(event.target)) {
                return;
              }

              const wheelDelta = event.deltaY;
              if (wheelDelta === 0) {
                return;
              }

              const zoomFactor = wheelDelta > 0 ? 0.9 : 1.1;
              this.zoom(zoomFactor, { x: event.clientX, y: event.clientY });
              event.preventDefault();
            },
            { passive: false }
          );
        }

        handlePointerDown(event) {
          if (event.button !== 0) {
            return;
          }

          this.didPan = false;

          if (this.envPanel && this.envPanel.contains(event.target)) {
            return;
          }

          if (
            event.target &&
            event.target.closest &&
            event.target.closest('.node')
          ) {
            return;
          }

          this.isPanning = true;
          this.activePointerId = event.pointerId;
          this.lastPanPosition = { x: event.clientX, y: event.clientY };
          this.container.classList.add('panning');

          if (this.container.setPointerCapture) {
            try {
              this.container.setPointerCapture(event.pointerId);
            } catch (_) {
              // Ignore cases where pointer capture is not available
            }
          }

          event.preventDefault();
        }

        handlePointerMove(event) {
          if (!this.isPanning || event.pointerId !== this.activePointerId) {
            return;
          }

          const deltaX = event.clientX - this.lastPanPosition.x;
          const deltaY = event.clientY - this.lastPanPosition.y;
          this.lastPanPosition = { x: event.clientX, y: event.clientY };

          this.panX += deltaX;
          this.panY += deltaY;
          if (deltaX !== 0 || deltaY !== 0) {
            this.didPan = true;
          }
          this.applyTransform();

          event.preventDefault();
        }

        handlePointerUp(event) {
          if (event.pointerId !== this.activePointerId) {
            return;
          }

          this.isPanning = false;
          this.activePointerId = null;
          this.container.classList.remove('panning');

          if (this.container.releasePointerCapture) {
            try {
              this.container.releasePointerCapture(event.pointerId);
            } catch (_) {
              // Ignore cases where release fails
            }
          }
        }

        handleContainerClick(event) {
          if (this.didPan) {
            this.didPan = false;
            return;
          }

          if (this.envPanel && this.envPanel.contains(event.target)) {
            return;
          }

          if (
            event.target &&
            event.target.closest &&
            event.target.closest('.node')
          ) {
            return;
          }

          if (this.selectedNodeKey !== null) {
            this.selectedNodeKey = null;
            this.updateSelectionHighlight();
            this.refreshEnvPanel();
          }
        }

        handleEnvPanelMouseLeave(event) {
          const nextTarget = event.relatedTarget;
          if (nextTarget && nextTarget.closest && nextTarget.closest('.node')) {
            return;
          }

          if (
            this.envPanel &&
            nextTarget &&
            this.envPanel.contains(nextTarget)
          ) {
            return;
          }

          if (this.hoveredNodeKey !== null) {
            this.hoveredNodeKey = null;
          }

          this.refreshEnvPanel();
        }

        applyTransform() {
          if (!this.contentLayer) {
            return;
          }

          this.contentLayer.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.zoomLevel})`;
          this.contentLayer.style.transformOrigin = 'top left';
          this.updateEnvPanelLayout();
        }

        buildNodeElement(node) {
          const nodeElement = document.createElement('div');
          nodeElement.className = 'node';
          nodeElement.dataset.key = node.key;

          const header = document.createElement('div');
          header.className = 'node-header';

          const titleGroup = document.createElement('div');
          titleGroup.className = 'node-title-group';

          const nameEl = document.createElement('div');
          nameEl.className = 'node-name';
          nameEl.textContent = node.name;
          titleGroup.appendChild(nameEl);

          if (node.code && node.code.trim()) {
            const codeEl = document.createElement('div');
            codeEl.className = 'node-code';
            codeEl.textContent = node.code;
            titleGroup.appendChild(codeEl);
          }

          const varEl = document.createElement('div');
          varEl.className = 'tvar';
          varEl.textContent = 'tv_' + node.varNum;

          header.appendChild(titleGroup);
          header.appendChild(varEl);
          nodeElement.appendChild(header);

          if (node.exprTyp && node.exprTyp.trim()) {
            const typeEl = document.createElement('div');
            typeEl.className = 'node-type';
            typeEl.textContent = node.exprTyp;
            nodeElement.appendChild(typeEl);
          }

          return nodeElement;
        }

        renderNode(node) {
          const position = this.nodePositions.get(node.key);
          if (!position) return;

          const nodeWidth = this.nodeWidths.get(node.key);
          const nodeElement = this.buildNodeElement(node);
          nodeElement.style.left = position.x + 'px';
          nodeElement.style.top = position.y + 'px';
          nodeElement.style.width = nodeWidth + 'px';
          this.attachNodeEvents(node, nodeElement);
          this.contentLayer.appendChild(nodeElement);
        }

        attachNodeEvents(node, nodeElement) {
          if (!nodeElement) {
            return;
          }

          nodeElement.addEventListener('mouseenter', () => {
            this.hoveredNodeKey = node.key;
            this.refreshEnvPanel();
          });

          nodeElement.addEventListener('mouseleave', event => {
            const nextTarget = event.relatedTarget;
            if (
              nextTarget &&
              nextTarget.closest &&
              nextTarget.closest('.node')
            ) {
              return;
            }
            if (
              this.envPanel &&
              nextTarget &&
              this.envPanel.contains(nextTarget)
            ) {
              return;
            }
            this.hoveredNodeKey = null;
            this.refreshEnvPanel();
          });

          nodeElement.addEventListener('click', event => {
            event.stopPropagation();
            this.selectedNodeKey = node.key;
            this.updateSelectionHighlight();
            this.refreshEnvPanel();
          });
        }

        updateSelectionHighlight() {
          if (!this.contentLayer) {
            return;
          }

          const nodeElements = this.contentLayer.querySelectorAll('.node');
          const selectedKeyString =
            this.selectedNodeKey !== null ? String(this.selectedNodeKey) : null;
          nodeElements.forEach(nodeElement => {
            const elementKey = nodeElement.dataset.key ?? '';
            if (
              selectedKeyString !== null &&
              elementKey === selectedKeyString
            ) {
              nodeElement.classList.add('selected');
            } else {
              nodeElement.classList.remove('selected');
            }
          });
        }

        refreshEnvPanel() {
          const activeKey =
            this.hoveredNodeKey !== null
              ? this.hoveredNodeKey
              : this.selectedNodeKey;
          const node =
            activeKey !== null ? this.nodes.get(activeKey) || null : null;

          this.updateEnvPanelNodePreview(node);

          if (node) {
            this.setEnvPanelEnvironment(node.env);
          } else {
            this.setEnvPanelEnvironment(null);
          }
        }

        adjustLevelSpacing(delta) {
          const bounded = Math.min(
            this.maxLevelHeight,
            Math.max(this.minLevelHeight, this.levelHeight + delta)
          );
          if (bounded === this.levelHeight) {
            return;
          }

          this.levelHeight = bounded;
          this.calculateLayout();
          this.render();
        }

        zoom(factor, focalPoint = null) {
          const oldZoom = this.zoomLevel;
          const newZoom = Math.min(
            this.maxZoom,
            Math.max(this.minZoom, oldZoom * factor)
          );
          const zoomChange = newZoom / oldZoom;

          if (focalPoint && zoomChange !== 1 && this.contentLayer) {
            const layerRect = this.contentLayer.getBoundingClientRect();
            const offsetX = focalPoint.x - layerRect.left;
            const offsetY = focalPoint.y - layerRect.top;

            this.panX = offsetX - (offsetX - this.panX) * zoomChange;
            this.panY = offsetY - (offsetY - this.panY) * zoomChange;
          }

          this.zoomLevel = newZoom;
          this.applyTransform();
        }

        resetZoom() {
          this.zoomLevel = 1;
          this.panX = 0;
          this.panY = 0;
          this.applyTransform();
        }
      }

      // Global instance
      let treeViz;

      // Initialize when page loads
      window.addEventListener('load', () => {
        treeViz = new TreeVisualizer();
      });
    </script>
  </body>
</html>
